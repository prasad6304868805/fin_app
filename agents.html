<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fin_App - Agents</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
display:flex;
min-height:100vh;
background:#F8FCFF;
}

.sidebar{
width:250px;
background:#DCEEFF;
padding:25px;
border-right:1px solid #CFE5FF;
}

.logo{
font-size:30px;
font-weight:700;
color:#1565C0;
margin-bottom:40px;
}

.menu{
list-style:none;
}

.menu li{
margin-bottom:12px;
}

.menu a{
display:block;
text-decoration:none;
color:#334155;
padding:15px;
border-radius:12px;
font-weight:500;
transition:.3s;
}

.menu a:hover{
background:white;
}

.active a{
background:white;
color:#1565C0;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.main{
flex:1;
padding:25px;
}
.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.4);
justify-content:center;
align-items:center;
}

.popup-box{
background:white;
padding:30px;
width:500px;
max-width:90%;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.popup-box input{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:10px;
}

.popup-box button{
width:100%;
padding:12px;
border:none;
background:#1565C0;
color:white;
border-radius:10px;
cursor:pointer;
}

.agent-profile{
margin-top:20px;
padding:15px;
background:#EAF4FF;
border-radius:15px;
}
.header{
background:white;
padding:25px;
border-radius:20px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 4px 15px rgba(77,168,255,.08);
}

.header h1{
color:#1565C0;
}

.header p{
color:#64748B;
margin-top:5px;
}

.profile{
background:#EAF4FF;
padding:12px 20px;
border-radius:50px;
}

.profile a{
text-decoration:none;
color:#1565C0;
font-weight:600;
}

.search{
margin-top:20px;
}

.search input{
width:100%;
padding:15px;
border-radius:15px;
border:1px solid #DCEEFF;
outline:none;
}

.agent-grid{
margin-top:25px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.agent-card{
background:white;
padding:25px;
border-radius:25px;
text-align:center;
border:1px solid #DCEEFF;
box-shadow:0 5px 15px rgba(77,168,255,.08);
cursor:pointer;
transition:.3s;
}

.agent-card:hover{
transform:translateY(-5px);
}

.avatar{
width:100px;
height:100px;
border-radius:50%;
background:#EAF4FF;
margin:auto;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
color:#1565C0;
}

.agent-card h3{
margin-top:15px;
color:#1565C0;
}

.amount{
margin-top:15px;
font-size:28px;
font-weight:700;
}

.label{
margin-top:5px;
color:#64748B;
}

.collection{
margin-top:15px;
padding:10px;
border-radius:10px;
background:#DCFCE7;
color:#15803D;
font-weight:600;
}

.pay-btn{
position:fixed;
left:20px;
bottom:20px;
width:180px;
height:60px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#22C55E,#16A34A);
color:white;
font-size:20px;
font-weight:700;
cursor:pointer;
box-shadow:0 10px 25px rgba(34,197,94,.35);
}

@media(max-width:768px){

body{
flex-direction:column;
}

.sidebar{
width:100%;
}

.header{
flex-direction:column;
gap:15px;
text-align:center;
}

}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
🏦 Fin_App
</div>

<ul class="menu">

<li>
<a href="index.html">📊 Dashboard</a>
</li>

<li class="active">
<a href="agents.html">👨 Agents</a>
</li>

</ul>

</div>

<div class="main">

<div class="header">

<div>
<h1>Agents</h1>
<p>Manage Agent Performance</p>
</div>

<div class="profile">
<a href="login.html">🔑 Login</a>
</div>

</div>

<div class="search">
<input type="text" placeholder="Search Agent">
</div>

<div class="agent-grid">

<div class="agent-card" onclick="window.location.href='agent-details.html'">

<div class="avatar">👨</div>

<h3>Ravi Kumar</h3>

<div class="amount">
₹5,00,000
</div>

<div class="label">
Balance Amount
</div>

<div class="collection">
12 Customers
</div>

</div>

<div class="agent-card" onclick="window.location.href='agent-details.html'">

<div class="avatar">👨</div>

<h3>Suresh</h3>

<div class="amount">
₹3,50,000
</div>

<div class="label">
Balance Amount
</div>

<div class="collection">
8 Customers
</div>

</div>

<div class="agent-card" onclick="window.location.href='agent-details.html'">

<div class="avatar">👨</div>

<h3>Mahesh</h3>

<div class="amount">
₹8,00,000
</div>

<div class="label">
Balance Amount
</div>

<div class="collection">
15 Customers
</div>

</div>

<div class="agent-card" onclick="window.location.href='agent-details.html'">

<div class="avatar">👨</div>

<h3>Kiran</h3>

<div class="amount">
₹4,20,000
</div>

<div class="label">
Balance Amount
</div>

<div class="collection">
10 Customers
</div>

</div>

</div>

</div>

<button class="pay-btn" onclick="openPopup()">
💰 Pay
</button>
<div id="payPopup" class="popup">

<div class="popup-box">

<h2>Pay Agent</h2>

<input type="text" id="agentId" placeholder="Enter Agent ID">

<button onclick="findAgent()">Search Agent</button>

<div id="agentInfo"></div>

</div>

</div>
<script>

const agents = {

AG001:{
name:"Ravi Kumar",
balance:500000
},

AG002:{
name:"Suresh",
balance:350000
},

AG003:{
name:"Mahesh",
balance:800000
},

AG004:{
name:"Kiran",
balance:420000
}

};

let currentAgent=null;

function openPopup(){

document.getElementById("payPopup").style.display="flex";

}

function findAgent(){

let id =
document.getElementById("agentId")
.value
.toUpperCase();

if(agents[id]){

currentAgent=id;

document.querySelector(".popup-box").innerHTML = `

<h2 style="
color:#1565C0;
margin-bottom:20px;
text-align:center;">
💰 Agent Payment
</h2>

<div class="agent-profile">

<div style="
text-align:center;
margin-bottom:20px;
">

<div style="
width:80px;
height:80px;
border-radius:50%;
background:#EAF4FF;
display:flex;
justify-content:center;
align-items:center;
font-size:35px;
margin:auto;
">
👨
</div>

<h3 style="
margin-top:10px;
color:#1565C0;
">
${agents[id].name}
</h3>

</div>

<div style="
background:linear-gradient(135deg,#1565C0,#4DA8FF);
padding:20px;
border-radius:15px;
color:white;
margin-bottom:20px;
">

<p>Available Balance</p>

<h1>
₹<span id="balanceAmount">
${agents[id].balance.toLocaleString()}
</span>
</h1>

</div>

<label style="
font-weight:600;
display:block;
margin-bottom:10px;
">
Payment Amount
</label>

<input
type="number"
id="payAmount"
placeholder="Enter Amount">

<button
style="
margin-top:15px;
background:#22C55E;"
onclick="confirmPayment()">

Confirm Payment

</button>

</div>

`;

}else{

alert("Agent Not Found");

}

}

function confirmPayment(){

let amount =
parseInt(
document.getElementById("payAmount").value
);

if(!amount || amount<=0){

alert("Enter Valid Amount");
return;

}

if(amount > agents[currentAgent].balance){

alert("Amount exceeds balance");
return;

}

agents[currentAgent].balance =
agents[currentAgent].balance - amount;

let remainingBalance =
agents[currentAgent].balance.toLocaleString();

document.querySelector(".popup-box").innerHTML = `

<div style="
text-align:center;
padding:20px;
">

<div style="
font-size:60px;
margin-bottom:15px;
">
✅
</div>

<h2 style="
color:#16A34A;
margin-bottom:15px;
">
Payment Successful
</h2>

<p style="
font-size:18px;
margin-bottom:10px;
">
Amount Paid:
<b>₹${amount.toLocaleString()}</b>
</p>

<p style="
font-size:18px;
margin-bottom:20px;
">
Remaining Balance:
<b>₹${remainingBalance}</b>
</p>

<button
onclick="location.reload()"
style="
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#1565C0;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
">

Done

</button>

</div>

`;

}

window.onclick=function(event){

if(event.target===document.getElementById("payPopup")){

document.getElementById("payPopup").style.display="none";

}

}

</script>
</body>
</html>
