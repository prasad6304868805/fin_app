<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fin_App Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#DCEEFF,#F8FCFF);
}

.login-container{
    width:400px;
    background:white;
    padding:40px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(77,168,255,.15);
}

.logo{
    text-align:center;
    font-size:32px;
    font-weight:700;
    color:#1565C0;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#64748B;
    margin-bottom:30px;
}

.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    color:#334155;
    font-weight:600;
}

.input-group input{
    width:100%;
    padding:14px;
    border:1px solid #DCEEFF;
    border-radius:12px;
    outline:none;
    font-size:15px;
}

.input-group input:focus{
    border-color:#4DA8FF;
}

.login-btn{
    width:100%;
    height:50px;
    border:none;
    border-radius:12px;
    background:#1565C0;
    color:white;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
}

.login-btn:hover{
    background:#0D47A1;
}

.error{
    color:red;
    text-align:center;
    margin-top:15px;
    font-size:14px;
}

.demo{
    margin-top:25px;
    padding:15px;
    background:#EAF4FF;
    border-radius:12px;
    text-align:center;
    color:#1565C0;
}

</style>
</head>

<body>

<div class="login-container">

<div class="logo">
🏦 Fin_App
</div>

<div class="subtitle">
Finance Management System
</div>

<div class="input-group">
<label>Username</label>
<input type="text" id="username" placeholder="Enter Username">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password" placeholder="Enter Password">
</div>

<button class="login-btn" onclick="login()">
Login
</button>

<div id="error" class="error"></div>

<div class="demo">
<b>Demo Login</b><br>
Username: admin<br>
Password: admin123
</div>

</div>

<script>

function login(){

    let username=document.getElementById("username").value;
    let password=document.getElementById("password").value;

    if(username==="admin" && password==="admin123"){
        window.location.href="dashboard.html";
    }
    else{
        document.getElementById("error").innerHTML=
        "Invalid Username or Password";
    }

}

</script>

</body>
</html>
